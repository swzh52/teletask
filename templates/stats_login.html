<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8"><title>统计登录</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;display:flex;
  align-items:center;justify-content:center;min-height:100vh}
.box{background:#fff;border-radius:12px;padding:32px;width:320px;
  box-shadow:0 2px 12px rgba(0,0,0,.1)}
h2{color:#185fa5;margin-bottom:20px;font-size:1.2rem}
input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;
  font-size:.9rem;margin-bottom:12px}
button{width:100%;padding:10px;background:#185fa5;color:#fff;border:none;
  border-radius:6px;cursor:pointer;font-size:.9rem}
.err{color:#e03;font-size:.82rem;margin-bottom:10px}
</style></head>
<body>
<div class="box">
  <h2>📊 统计信息查看</h2>
  {% if err %}<p class="err">密码错误，请重试</p>{% endif %}
  <form method="post" action="/do_stats_login">
    <input name="pwd" type="password" placeholder="输入管理密码" autofocus>
    <button type="submit">查 看</button>
  </form>
</div>
</body></html>
